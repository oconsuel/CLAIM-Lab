upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name ai.philippovich.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ai.philippovich.ru;

    ssl_certificate /etc/letsencrypt/live/ai.philippovich.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.philippovich.ru/privkey.pem;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

