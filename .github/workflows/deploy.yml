name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/oconsuel/claim-lab-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/oconsuel/claim-lab-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/lab
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u oconsuel --password-stdin
            docker-compose pull backend frontend

            # Backend update with v1 fallback
            if ! docker-compose up -d --no-build backend; then
              echo "backend up failed, applying fallback recreate"
              docker-compose stop backend || true
              docker-compose rm -f backend || true
              docker rm -f claim-lab-backend || true
              docker-compose up -d --no-build backend
            fi

            # Frontend update with v1 fallback
            if ! docker-compose up -d --no-build frontend; then
              echo "frontend up failed, applying fallback recreate"
              docker-compose stop frontend || true
              docker-compose rm -f frontend || true
              docker rm -f claim-lab-frontend || true
              docker-compose up -d --no-build frontend
            fi

            # Nginx may hit Docker Hub pull limits; start using local image if already present.
            docker-compose up -d --no-build nginx || true

            # Final convergence
            docker-compose up -d --no-build
            docker image prune -f