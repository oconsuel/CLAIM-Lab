services:
  backend:
    build: ./backend
    container_name: claim-lab-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "0.9"
          memory: 1G
    environment:
      - PYTHONUNBUFFERED=1
      - ADMIN_DB_PATH=/data/logs/admin_logs.db
    env_file:
      - ./backend/.env
    volumes:
      - admin_data:/data

  frontend:
    build: ./frontend
    container_name: claim-lab-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: claim-lab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  admin_data:
