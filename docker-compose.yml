services:
  backend:
    build: ./backend
    container_name: claim-lab-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    container_name: claim-lab-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: claim-lab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
